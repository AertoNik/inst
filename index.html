<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NETWORK SIMULATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { noir: '#0a0a0c', noirLight: '#18181b', accent: '#3b82f6' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Space Grotesk', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-black text-gray-100 flex justify-center min-h-screen">
    <!-- Мобильный контейнер -->
    <div class="w-full max-w-[450px] bg-noir min-h-screen relative shadow-2xl flex flex-col overflow-hidden">
        
        <!-- Верхняя панель -->
        <header class="flex justify-between items-center p-4 border-b border-gray-800 z-10 bg-noir">
            <button id="nav-btn-settings" class="text-2xl">≡</button>
            <h1 id="header-username" class="font-display text-lg font-bold tracking-wider">@artnik_film</h1>
            <button id="nav-btn-add" class="text-2xl">+</button>
        </header>

        <!-- Основной контент (Виды) -->
        <main id="main-content" class="flex-1 overflow-y-auto pb-16 hide-scrollbar relative">
            <!-- Здесь рендерится профиль, настройки или статистика -->
        </main>

        <!-- Нижняя навигация -->
        <nav class="absolute bottom-0 w-full h-14 bg-noir border-t border-gray-800 flex justify-around items-center z-20">
            <button id="tab-home" class="text-2xl opacity-50 hover:opacity-100 transition">🏠</button>
            <button id="tab-reels" class="text-2xl opacity-50 hover:opacity-100 transition">▶️</button>
            <button id="tab-stats" class="text-2xl opacity-50 hover:opacity-100 transition">📊</button>
            <button id="tab-profile" class="w-8 h-8 rounded-full bg-gray-700 overflow-hidden border-2 border-transparent transition">
                <img id="nav-avatar" src="" alt="Profile" class="w-full h-full object-cover">
            </button>
        </nav>

        <!-- Модальное окно добавления -->
        <div id="add-modal" class="fixed inset-0 bg-black/90 z-50 hidden flex-col justify-end">
            <div class="bg-noirLight rounded-t-2xl p-6 flex flex-col gap-4 animate-slide-up">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Создать</h2>
                    <button id="close-add-modal" class="text-gray-400 text-2xl">&times;</button>
                </div>
                <label class="btn-primary text-center cursor-pointer">
                    Добавить Публикацию (Фото/Видео)
                    <input type="file" id="upload-post" accept="image/*,video/*" class="hidden">
                </label>
                <label class="btn-primary text-center cursor-pointer">
                    Добавить Reels
                    <input type="file" id="upload-reel" accept="video/*" class="hidden">
                </label>
                <label class="btn-primary text-center cursor-pointer bg-gradient-to-r from-orange-500 to-pink-600 border-none text-white">
                    Добавить Историю
                    <input type="file" id="upload-story" accept="image/*,video/*" class="hidden">
                </label>
            </div>
        </div>

        <!-- Полноэкранный просмотр медиа / Сторис -->
        <div id="viewer-modal" class="fixed inset-0 bg-black z-[60] hidden flex-col">
            <div id="viewer-progress" class="w-full h-1 bg-gray-800 hidden"><div id="viewer-bar" class="h-full bg-white w-0 transition-all duration-1000"></div></div>
            <button id="close-viewer" class="absolute top-4 right-4 text-white text-3xl z-[70] drop-shadow-md">&times;</button>
            <div id="viewer-content" class="flex-1 flex justify-center items-center overflow-hidden relative"></div>
            <div id="viewer-info" class="p-4 bg-gradient-to-t from-black to-transparent"></div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
