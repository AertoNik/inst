<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NETWORK SIMULATOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
        <header class="top-bar">
            <button class="icon-btn" onclick="switchTab('settings')">
                <svg class="nav-svg" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-linecap="round"/></svg>
            </button>
            <h1 class="username-title" id="header-username">
                <span id="header-name-text">@artnik_film</span>
                <span id="badge-header" class="verified-badge hidden"></span>
            </h1>
            <button class="icon-btn" onclick="openAddModal()">
                <svg class="nav-svg" viewBox="0 0 24 24"><path d="M12 2v20m10-10H2" stroke="currentColor" stroke-linecap="round"/></svg>
            </button>
        </header>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <main class="main-content">
            
            <!-- ЭКРАН: ПРОФИЛЬ -->
            <div id="view-profile" class="view active">
                <div class="profile-header">
                    <div class="avatar-wrapper" onclick="document.getElementById('avatar-upload').click()">
                        <img id="profile-avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23555'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E">
                        <input type="file" id="avatar-upload" accept="image/*" hidden>
                    </div>
                    <div class="profile-stats">
                        <div class="stat-item"><span id="stat-posts">0</span><small>Посты</small></div>
                        <div class="stat-item"><span id="stat-followers">1420</span><small>Подписчики</small></div>
                        <div class="stat-item"><span id="stat-following">35</span><small>Подписки</small></div>
                    </div>
                </div>
                
                <!-- Био теперь можно редактировать по клику -->
                <div class="profile-bio">
                    <h2 id="bio-name-container">
                        <span id="bio-name" contenteditable="true" style="outline: none;">Твое Имя</span>
                        <span id="badge-bio" class="verified-badge hidden"></span>
                    </h2>
                    <p id="bio-text" contenteditable="true" style="outline: none;">Режиссер / Креатор<br>ARCHETYPE System</p>
                </div>
                
                <div class="action-buttons">
                    <button class="btn" onclick="switchTab('settings')">Настройки</button>
                    <button class="btn">Поделиться</button>
                </div>

                <!-- Блок Сторис -->
                <div class="stories-bar" id="stories-bar"></div>

                <!-- Табы сетки -->
                <div class="grid-tabs">
                    <button class="grid-tab active" id="tab-btn-posts" onclick="setGridTab('posts')">▦ Посты</button>
                    <button class="grid-tab" id="tab-btn-reels" onclick="setGridTab('reels')">▶ Reels</button>
                </div>

                <!-- Сетка фото/видео -->
                <div class="feed-grid" id="profile-grid"></div>
            </div>

            <!-- ЭКРАН: СТАТИСТИКА -->
            <div id="view-stats" class="view">
                <div class="pad-15">
                    <h2>Аналитика профиля</h2>
                    <div class="stats-cards">
                        <div class="card" style="grid-column: span 2; text-align: center; background: #1a1a1a;">
                            <span style="font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">Динамика аудитории (24ч)</span><br>
                            <div style="display: flex; justify-content: space-around; margin-top: 15px; align-items: center;">
                                <div style="color: #4ade80; font-size: 28px; font-weight: bold;">+<span id="stat-24-plus">0</span></div>
                                <div style="width: 1px; height: 30px; background: #333;"></div>
                                <div style="color: #f87171; font-size: 28px; font-weight: bold;">-<span id="stat-24-minus">0</span></div>
                            </div>
                        </div>
                        <div class="card">Охват (Просмотры)<br><b id="total-views" class="accent-text">0</b></div>
                        <div class="card">Всего лайков<br><b id="total-likes">0</b></div>
                        <div class="card">Комментарии<br><b id="total-comments">0</b></div>
                        <div class="card">Репосты<br><b id="total-reposts">0</b></div>
                    </div>
                </div>
            </div>

            <!-- ЭКРАН: НАСТРОЙКИ -->
            <div id="view-settings" class="view">
                <div class="pad-15">
                    <h2>Настройки</h2>
                    <div class="input-group">
                        <label>Официальный аккаунт</label>
                        <button class="btn" onclick="toggleVerification()" id="btn-verify">Включить галочку верификации</button>
                    </div>
                    <div class="input-group">
                        <label>Тема оформления</label>
                        <button class="btn" onclick="toggleTheme()">Переключить Dark/Light</button>
                    </div>
                    <div class="input-group">
                        <label>Никнейм</label>
                        <input type="text" id="inp-username" class="input-field">
                    </div>
                    <div class="input-group">
                        <label>Подписчики (Для алгоритма охватов)</label>
                        <input type="number" id="inp-followers" class="input-field">
                    </div>
                    <button class="btn primary-btn" onclick="saveSettings()">Сохранить профиль</button>
                    
                    <hr class="divider" style="border: none; border-top: 1px solid #333; margin: 20px 0;">
                    <button class="btn danger-btn" onclick="resetProgress()" style="background: #3a1111; color: #ff4d4d; border: 1px solid #ff4d4d; width: 100%;">⚠️ Сбросить весь прогресс</button>
                </div>
            </div>
        </main>

        <!-- НИЖНЯЯ НАВИГАЦИЯ (SVG ИКОНКИ) -->
        <nav class="bottom-nav">
            <button class="nav-btn" onclick="switchTab('profile')">
                <svg class="nav-svg filled" viewBox="0 0 24 24"><path d="M9.005 16.545a2.997 2.997 0 012.997-2.997h0a2.997 2.997 0 012.997 2.997v4.453h4.043v-8.77l-7.04-5.836-7.04 5.836v8.77h4.043v-4.453z"/></svg>
            </button>
            <button class="nav-btn">
                <svg class="nav-svg" viewBox="0 0 24 24"><path d="M19 10.5A8.5 8.5 0 1110.5 2a8.5 8.5 0 018.5 8.5z"/><line x1="16.5" y1="16.5" x2="21.5" y2="21.5"/></svg>
            </button>
            <button class="nav-btn" onclick="openAddModal()">
                <svg class="nav-svg" viewBox="0 0 24 24" style="stroke: var(--text); fill: none;"><path d="M12 2v20m10-10H2"/></svg>
            </button>
            <button class="nav-btn" onclick="switchTab('stats')">
                <svg class="nav-svg" viewBox="0 0 24 24"><path d="M3 3v18h18M7 16v-4m4 4v-8m4 8V6"/></svg>
            </button>
            <button class="nav-btn" onclick="switchTab('profile')">
                <svg class="nav-svg" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2"/></svg>
            </button>
        </nav>

        <!-- МОДАЛКИ (Без изменений) -->
        <div id="modal-add" class="modal hidden">
            <div class="modal-content slide-up">
                <div class="modal-header">
                    <h3>Создать</h3>
                    <button class="close-btn" onclick="closeModals()">&times;</button>
                </div>
                <label class="btn add-btn">Добавить Пост (Фото/Видео) <input type="file" id="upload-post" accept="image/*,video/*" hidden></label>
                <label class="btn add-btn">Добавить Reels (Видео) <input type="file" id="upload-reel" accept="video/*" hidden></label>
                <label class="btn add-btn story-btn">Добавить Историю <input type="file" id="upload-story" accept="image/*,video/*" hidden></label>
            </div>
        </div>

        <div id="modal-viewer" class="viewer hidden">
            <div id="story-progress" class="story-progress hidden"><div id="story-bar"></div></div>
            <button class="close-viewer-btn" onclick="closeModals()">&times;</button>
            <div id="viewer-media" class="viewer-media"></div>
            <div id="viewer-info" class="viewer-info"></div>
            <div id="my-comment-box" class="comment-box hidden">
                <input type="text" id="my-comment-input" placeholder="Добавить комментарий...">
                <button onclick="addMyComment()">Отправить</button>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
