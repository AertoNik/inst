<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NETWORK SIMULATOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Контейнер для важных Push-уведомлений -->
        <div id="toast-container" class="toast-container"></div>

        <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
        <header class="top-bar">
            <button class="icon-btn" onclick="switchTab('settings')">
                <svg class="nav-svg" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <h1 class="username-title" id="header-username">
                <span id="header-name-text">@artnik_film</span>
                <span id="badge-header" class="verified-badge hidden"></span>
            </h1>
            <div style="display: flex; gap: 12px; align-items: center;">
                <button class="icon-btn" onclick="openAddModal()">
                    <svg class="nav-svg" viewBox="0 0 24 24"><path d="M12 2v20m10-10H2"/></svg>
                </button>
                <!-- Кнопка Direct -->
                <button class="icon-btn" onclick="switchTab('direct')" style="position: relative;">
                    <svg class="nav-svg" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    <span id="dm-badge" class="dm-badge hidden">0</span>
                </button>
            </div>
        </header>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <main class="main-content">
            
            <!-- ЭКРАН: ПРОФИЛЬ -->
            <div id="view-profile" class="view active">
                <div class="profile-header">
                    <div class="avatar-wrapper" onclick="document.getElementById('avatar-upload').click()">
                        <img id="profile-avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23555'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E">
                        <input type="file" id="avatar-upload" accept="image/*" hidden>
                    </div>
                    <div class="profile-stats">
                        <div class="stat-item"><span id="stat-posts">0</span><small>Посты</small></div>
                        <div class="stat-item"><span id="stat-followers">1420</span><small>Подписчики</small></div>
                        <div class="stat-item"><span id="stat-following">35</span><small>Подписки</small></div>
                    </div>
                </div>
                
                <div class="profile-bio">
                    <h2 id="bio-name-container">
                        <span id="bio-name" contenteditable="true" style="outline: none;">Твое Имя</span>
                        <span id="badge-bio" class="verified-badge hidden"></span>
                    </h2>
                    <p id="bio-text" contenteditable="true" style="outline: none;">Режиссер / Креатор<br>ARCHETYPE System</p>
                </div>
                
                <div class="action-buttons">
                    <button class="btn" onclick="switchTab('settings')">Настройки</button>
                    <button class="btn">Поделиться</button>
                </div>

                <div class="stories-bar" id="stories-bar"></div>

                <div class="grid-tabs">
                    <button class="grid-tab active" id="tab-btn-posts" onclick="setGridTab('posts')">▦ Посты</button>
                    <button class="grid-tab" id="tab-btn-reels" onclick="setGridTab('reels')">▶ Reels</button>
                    <!-- Векторный Архив вместо смайлика -->
                    <button class="grid-tab" id="tab-btn-archive" onclick="setGridTab('archive')" style="display:flex; justify-content:center; align-items:center;">
                        <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg>
                    </button>
                </div>

                <div class="feed-grid" id="profile-grid"></div>
            </div>

            <!-- ЭКРАН: СТАТИСТИКА -->
            <div id="view-stats" class="view">
                <div class="pad-15">
                    <h2>Аналитика профиля</h2>
                    <div class="stats-cards">
                        <div class="card" style="grid-column: span 2; text-align: center; background: var(--bg-sec);">
                            <span style="font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">Динамика аудитории (24ч)</span><br>
                            <div style="display: flex; justify-content: space-around; margin-top: 15px; align-items: center;">
                                <div style="color: #4ade80; font-size: 28px; font-weight: bold;">+<span id="stat-24-plus">0</span></div>
                                <div style="width: 1px; height: 30px; background: var(--border);"></div>
                                <div style="color: #f87171; font-size: 28px; font-weight: bold;">-<span id="stat-24-minus">0</span></div>
                            </div>
                        </div>
                        <div class="card">Охват (Просмотры)<br><b id="total-views" class="accent-text">0</b></div>
                        <div class="card">Всего лайков<br><b id="total-likes">0</b></div>
                        <div class="card">Комментарии<br><b id="total-comments">0</b></div>
                        <div class="card">Репосты<br><b id="total-reposts">0</b></div>
                    </div>
                </div>
            </div>

            <!-- ЭКРАН: DIRECT MESSAGES -->
            <div id="view-direct" class="view">
                <div class="pad-15" style="padding-bottom: 5px;">
                    <h2 style="margin: 0;">Сообщения</h2>
                </div>
                <div id="dm-list" class="dm-list"></div>
            </div>

            <!-- ЭКРАН: НАСТРОЙКИ -->
            <div id="view-settings" class="view">
                <div class="pad-15">
                    <h2>Настройки</h2>
                    <div class="input-group"><label>Официальный аккаунт</label><button class="btn" onclick="toggleVerification()" id="btn-verify">Включить галочку верификации</button></div>
                    <div class="input-group"><label>Тема оформления</label><button class="btn" onclick="toggleTheme()">Переключить Dark/Light</button></div>
                    <div class="input-group"><label>Никнейм</label><input type="text" id="inp-username" class="input-field"></div>
                    <div class="input-group"><label>Подписчики</label><input type="number" id="inp-followers" class="input-field"></div>
                    <button class="btn primary-btn" onclick="saveSettings()">Сохранить профиль</button>
                    <hr class="divider" style="border: none; border-top: 1px solid var(--border); margin: 20px 0;">
                    <button class="btn danger-btn" onclick="resetProgress()" style="background: rgba(255,0,0,0.1); color: #ff4d4d; border: 1px solid #ff4d4d; width: 100%;">⚠️ Сбросить весь прогресс</button>
                </div>
            </div>
        </main>

        <!-- НИЖНЯЯ НАВИГАЦИЯ -->
        <nav class="bottom-nav">
            <button class="nav-btn" onclick="switchTab('profile')"><svg class="nav-svg filled" viewBox="0 0 24 24"><path d="M9.005 16.545a2.997 2.997 0 012.997-2.997h0a2.997 2.997 0 012.997 2.997v4.453h4.043v-8.77l-7.04-5.836-7.04 5.836v8.77h4.043v-4.453z"/></svg></button>
            <button class="nav-btn"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M19 10.5A8.5 8.5 0 1110.5 2a8.5 8.5 0 018.5 8.5z"/><line x1="16.5" y1="16.5" x2="21.5" y2="21.5"/></svg></button>
            <button class="nav-btn" onclick="openAddModal()"><svg class="nav-svg" viewBox="0 0 24 24" style="stroke: var(--text); fill: none;"><path d="M12 2v20m10-10H2"/></svg></button>
            <button class="nav-btn" onclick="switchTab('stats')"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M3 3v18h18M7 16v-4m4 4v-8m4 8V6"/></svg></button>
            <button class="nav-btn" onclick="switchTab('profile')"><svg class="nav-svg" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2"/></svg></button>
        </nav>

        <!-- МОДАЛКА ДОБАВЛЕНИЯ И ВЬЮВЕР МЕДИА -->
        <div id="modal-add" class="modal hidden">
            <div class="modal-content slide-up">
                <div class="modal-header"><h3>Создать</h3><button class="close-btn" onclick="closeModals()">&times;</button></div>
                <label class="btn add-btn">Добавить Пост (Фото/Видео) <input type="file" id="upload-post" accept="image/*,video/*" hidden></label>
                <label class="btn add-btn">Добавить Reels (Видео) <input type="file" id="upload-reel" accept="video/*" hidden></label>
                <label class="btn add-btn story-btn">Добавить Историю <input type="file" id="upload-story" accept="image/*,video/*" hidden></label>
            </div>
        </div>

        <div id="modal-viewer" class="viewer hidden">
            <div id="story-progress" class="story-progress hidden"><div id="story-bar"></div></div>
            <button class="viewer-menu-btn" id="viewer-menu-toggle" onclick="openPostMenu()">⋮</button>
            <button class="close-viewer-btn" onclick="closeModals()">&times;</button>
            <div id="viewer-media" class="viewer-media"><div id="heart-anim" class="heart-overlay hidden"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div></div>
            <div id="viewer-info" class="viewer-info"></div>
            <div id="my-comment-box" class="comment-box hidden"><input type="text" id="my-comment-input" placeholder="Добавить комментарий..."><button onclick="addMyComment()">Отправить</button></div>
            <div id="post-action-menu" class="post-action-menu hidden"><button id="btn-archive" onclick="toggleArchive()">В архив</button><button onclick="deletePost()" style="color: #ff4d4d; font-weight: bold;">Удалить пост</button><button onclick="closePostMenu()">Отмена</button></div>
        </div>

        <!-- МОДАЛКА: ЧАТ DIRECT -->
        <div id="modal-chat" class="viewer hidden" style="background: var(--bg); z-index: 200;">
            <div class="top-bar">
                <button class="icon-btn" onclick="closeChat()">←</button>
                <h2 class="username-title" id="chat-header-name">@user</h2>
                <div style="width: 26px;"></div> <!-- Пустое место для баланса -->
            </div>
            <div class="chat-history" id="chat-history"></div>
            <div class="comment-box" style="background: var(--bg-sec); border-top: 1px solid var(--border);">
                <input type="text" id="chat-input" placeholder="Написать сообщение...">
                <button onclick="sendChatMessage()">Отправить</button>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
